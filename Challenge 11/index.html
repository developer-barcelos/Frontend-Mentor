<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />
        <link rel="stylesheet" href="./css/main.css" />
        <title>Frontend Mentor | Profile card component</title>
    </head>

    <body>
        <main class="card">
            <section class="card_header">
                <div class="header_pattern">
                    <img src="./images/bg-pattern-card.svg" alt="Card Pattern" />
                </div>

                <div class="header_profile">
                    <img src="./images/image-victor.jpg" alt="Victor Profile Picture" />
                </div>
            </section>

            <section class="card_user">
                <h1 class="user_name">Victor Crest <span class="user_age">26</span></h1>
                <p class="user_location">London</p>
            </section>

            <section class="card_footer">
                <ul class="stats">
                    <li class="stat">
                        <h2>80K</h2>
                        <p>Followers</p>
                    </li>

                    <li class="stat">
                        <h2>803K</h2>
                        <p>Likes</p>
                    </li>

                    <li class="stat">
                        <h2>1.4K</h2>
                        <p>Photos</p>
                    </li>
                </ul>
            </section>
        </main>
    </body>
</html>
